services:
  workouts-start:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        FUNCTION_NAME: workouts-start
    environment:
      SUPABASE_URL: ${SUPABASE_URL:-http://host.docker.internal:54321}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-replace_with_anon_key}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-replace_with_service_role_key}
      ROUTE_MATCH_PROVIDER: ${ROUTE_MATCH_PROVIDER:-stub}
    ports:
      - "54331:8000"

